<!DOCTYPE html>
<html lang="ru" data-theme="blue-grey">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глобальный чат | legion-kings.ru</title>
    <style>
        /* --- Переменные тем оформления --- */
        [data-theme="blue-grey"] {
            --bg-color: #1e2530;
            --panel-bg: #293241;
            --text-color: #e0e6ed;
            --accent-color: #3a86ff;
            --ghost-blue: #4e5d78;
            --chat-msg-bg: #323d52;
            --border-color: #3d4a61;
        }

        [data-theme="blue-white"] {
            --bg-color: #f0f4f8;
            --panel-bg: #ffffff;
            --text-color: #2b3a4a;
            --accent-color: #00b4d8;
            --ghost-blue: #90e0ef;
            --chat-msg-bg: #e6f0fa;
            --border-color: #d0daf0;
        }

        /* --- Базовые стили (Вдохновлено референсом) --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Шапка --- */
        header {
            background-color: var(--panel-bg);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-toggle-players {
            background: var(--accent-color);
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-toggle-players:hover {
            opacity: 0.9;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        .btn-theme {
            background: transparent;
            border: 2px solid var(--accent-color);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* --- Основной контейнер --- */
        .main-container {
            display: flex;
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        /* --- Боковое меню игроков --- */
        aside {
            width: 280px;
            background-color: var(--panel-bg);
            border-right: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: absolute;
            top: 0;
            left: -280px;
            bottom: 0;
            z-index: 10;
            transition: left 0.3s ease;
        }

        aside.open {
            left: 0;
            position: relative;
        }

        .sidebar-header {
            padding: 20px;
            font-weight: bold;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-list {
            list-style: none;
            padding: 10px;
            overflow-y: auto;
            flex: 1;
        }

        .player-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 5px;
        }

        .player-item:hover {
            background-color: var(--chat-msg-bg);
        }

        .player-avatar {
            width: 24px;
            height: 24px;
            background: var(--ghost-blue);
            border-radius: 4px;
            display: inline-block;
        }

        /* --- Секция чата --- */
        .chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: transparent;
            padding: 20px;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 10px;
        }

        /* Стиль для сообщений глобального чата */
        .message {
            background-color: var(--panel-bg);
            padding: 12px 16px;
            border-radius: 12px;
            max-width: 85%;
            align-self: flex-start;
            border-left: 4px solid var(--accent-color);
            animation: fadeIn 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .msg-meta {
            font-size: 0.8rem;
            color: var(--accent-color);
            margin-bottom: 4px;
            font-weight: bold;
            display: flex;
            gap: 10px;
        }

        .msg-time {
            opacity: 0.6;
            font-weight: normal;
        }

        .msg-text {
            word-break: break-word;
            line-height: 1.4;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Кастомизация скроллбара */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }
    </style>
</head>
<body data-theme="blue-grey">

    <header>
        <div class="logo-area">
            <button class="btn-toggle-players" id="toggleSidebar">
                👥 Игроки (<span id="onlineCount">0</span>)
            </button>
            <h1>глобальный чат <span style="color: var(--accent-color);">legion-kings.ru</span></h1>
        </div>
        <div class="controls">
            <button class="btn-theme" id="themeSwitcher">Сменить тему</button>
        </div>
    </header>

    <div class="main-container">
        <aside id="sidebar">
            <div class="sidebar-header">
                <span>Онлайн на сервере</span>
            </div>
            <ul class="player-list" id="playerList">
                <li style="padding: 10px; opacity: 0.6; text-align: center;">Загрузка списка...</li>
            </ul>
        </aside>

        <main class="chat-section">
            <div class="chat-messages" id="chatContainer">
                <div class="message" style="border-left-color: gray;">
                    <div class="msg-meta"><span class="msg-time">Система</span></div>
                    <div class="msg-text" style="opacity: 0.7;">Подключение к трансляции глобального чата...</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- 1. Логика переключения тем ---
        const themeSwitcher = document.getElementById('themeSwitcher');
        const body = document.body;

        themeSwitcher.addEventListener('click', () => {
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'blue-grey' ? 'blue-white' : 'blue-grey';
            body.setAttribute('data-theme', newTheme);
        });

        // --- 2. Открытие/Закрытие панели игроков ---
        const toggleSidebar = document.getElementById('toggleSidebar');
        const sidebar = document.getElementById('sidebar');

        toggleSidebar.addEventListener('click', () => {
            sidebar.classList.toggle('open');
        });

        // --- 3. Работа с данными (WebSocket) ---
        const chatContainer = document.getElementById('chatContainer');
        const playerList = document.getElementById('playerList');
        const onlineCount = document.getElementById('onlineCount');

        // ЗАМЕНИТЕ ЭТОТ URL НА АДРЕС ВАШЕГО БЭКЕНД-СЕРВЕРА
        const socketUrl = 'ws://localhost:8080';'; 
        let socket;

        function connectWebSocket() {
            socket = new WebSocket(socketUrl);

            socket.onmessage = function(event) {
                const data = JSON.parse(event.data);

                // Если бэкенд прислал новое сообщение чата
                if (data.type === 'message') {
                    appendMessage(data.user, data.text, data.time);
                }
                
                // Если бэкенд прислал обновление списка игроков
                if (data.type === 'players') {
                    updatePlayerList(data.players);
                }
            };

            socket.onclose = function() {
                console.log('Соединение разорвано. Попытка переподключения...');
                setTimeout(connectWebSocket, 5000); // Реконнект каждые 5 сек
            };
        }

        // Функция добавления сообщения в интерфейс
        function appendMessage(user, text, time = new Date().toLocaleTimeString()) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('message');
            
            messageElement.innerHTML = `
                <div class="msg-meta">
                    <span>${user}</span>
                    <span class="msg-time">${time}</span>
                </div>
                <div class="msg-text">${text}</div>
            `;
            
            chatContainer.appendChild(messageElement);
            chatContainer.scrollTop = chatContainer.scrollHeight; // Автоскролл вниз
        }

        // Функция обновления списка игроков
        function updatePlayerList(playersArray) {
            onlineCount.innerText = playersArray.length;
            playerList.innerHTML = '';
            
            if(playersArray.length === 0) {
                playerList.innerHTML = '<li style="padding: 10px; opacity: 0.6; text-align: center;">Сервер пуст</li>';
                return;
            }

            playersArray.forEach(player => {
                const li = document.createElement('li');
                li.classList.add('player-item');
                li.innerHTML = `
                    <div class="player-avatar"></div>
                    <span>${player}</span>
                `;
                playerList.appendChild(li);
            });
        }

        // Запуск подключения при загрузке
        connectWebSocket();

        // ДЕМО-ДАННЫЕ (Удалите или закомментируйте строки ниже, когда подключите настоящий бэкенд)
        setTimeout(() => {
            appendMessage('⚡ [Глобальный] Admin', 'Добро пожаловать на legion-kings.ru!');
            appendMessage('👑 [Глобальный] Player1', 'Всем привет, кто на спавне?');
            updatePlayerList(['Admin', 'Player1', 'Steve', 'Alex']);
        }, 1500);

    </script>
</body>
</html>
